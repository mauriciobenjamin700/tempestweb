name: PWA Gate

# Track P / P4 — locks PWA + offline + push regressions automatically.
#
# Three layers, fast to slow:
#   1. unit     — the manifest/sw/offline/webpush unit tests (always run; the
#                 authoritative gate that blocks a PR).
#   2. lighthouse — a headless Lighthouse PWA audit against a built static app,
#                 asserting the "installable" category via thresholds (not exact
#                 scores — Chromium headless is flaky on absolute numbers).
#   3. push-e2e — a Playwright end-to-end (subscribe -> server send -> notification)
#                 wired but allowed to be skipped where push is unavailable in CI.
#
# Pin the Chromium version (via the lhci / playwright action pins) and use
# thresholds so the gate is stable.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    name: PWA unit gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Service worker syntax check
        run: node --check client/sw/sw.js
      - name: PWA client tests (manifest, sw, offline, push)
        run: >-
          node --test
          tests/client/pwa-install-prompt.test.js
          tests/client/pwa-manifest.test.js
          tests/client/sw-strategies.test.js
          tests/client/sw-register.test.js
          tests/client/offline-store.test.js
          tests/client/offline-sync.test.js
          tests/client/web-push-client.test.js
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install (with webpush extra)
        run: uv sync --extra dev --extra server --extra webpush
      - name: PWA Python tests (manifest emitter + webpush)
        run: uv run pytest tests/unit/test_pwa*.py -q

  lighthouse:
    name: Lighthouse PWA (installable)
    runs-on: ubuntu-latest
    # Lighthouse needs a real build artifact (Trilho C). Until the static build is
    # wired this job validates the manifest and is allowed to be a soft signal.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Validate manifest is installable-shaped
        run: node scripts/pwa-gate.mjs
      - name: Lighthouse CI (PWA category)
        run: |
          npx --yes @lhci/cli@0.14.x autorun \
            --config=.lighthouserc.json || echo "lighthouse soft-fail (no build yet)"

  push-e2e:
    name: WebPush e2e (subscribe -> send -> notify)
    runs-on: ubuntu-latest
    # E2E push needs a served app + a push-capable headless browser. Wired here;
    # soft until the static build and a test VAPID pair are provisioned in CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Push e2e smoke (placeholder until build artifact exists)
        run: node scripts/pwa-gate.mjs --push-smoke
