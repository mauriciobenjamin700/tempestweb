# Reverse proxy for a tempestweb server-mode app: TLS + WebSocket upgrade +
# sticky sessions + long read timeouts for streaming (WS/SSE).

# ip_hash pins a client to one backend — required because WS/SSE session state
# is in-process (Track S — S4). Use a shared session backend to drop this.
upstream tempestweb {
    ip_hash;
    server app:8000;
    # server app2:8000;   # add replicas here
}

server {
    listen 80;
    server_name _;
    # Redirect to HTTPS in production:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://tempestweb;
        proxy_http_version 1.1;

        # WebSocket upgrade (GET /ws).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve the client's identity for the origin allowlist + logging.
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WS/SSE are long-lived: don't cut idle streams, don't buffer them.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = /health {
        proxy_pass http://tempestweb;
        access_log off;
    }
}

