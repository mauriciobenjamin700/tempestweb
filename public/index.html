<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tempestweb — Mode A (WASM / Pyodide)</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font: 16px/1.5 system-ui, sans-serif;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: Canvas;
        color: CanvasText;
        transition: opacity 0.3s;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #root { padding: 24px; }
      button { font: inherit; padding: 4px 12px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="splash"><span id="splash-msg">Loading Pyodide…</span></div>
    <div id="root"></div>

    <!--
      Mode A bootstrap. No build step: load Pyodide, write the tempestweb Python
      package into Pyodide's virtual FS (from public/manifest.json), run the app
      in-browser, and bridge its patches/events to the shared JS DOM renderer.

      The Pyodide version is PINNED (see NOTES-T3.md / A0 research): the prebuilt
      emscripten pydantic_core wheel is built against a specific Pyodide ABI, so
      the CDN tag and the bundled pydantic recipe must move together.
    -->
    <script type="module">
      // PIN — keep in sync with NOTES-T3.md (A0). pydantic_core's WASM wheel is
      // ABI-coupled to this Pyodide release.
      const PYODIDE_VERSION = "v314.0.0";
      const PYODIDE_INDEX = `https://cdn.jsdelivr.net/pyodide/${PYODIDE_VERSION}/full/`;
      // The app module to run, as a repo-relative path also listed in the
      // manifest. Swap this to point the bootstrap at a different app.
      const APP_MODULE = "examples/counter/app.py";

      const splash = document.getElementById("splash");
      const splashMsg = document.getElementById("splash-msg");
      const root = document.getElementById("root");
      const setSplash = (msg) => {
        splashMsg.textContent = msg;
      };

      // Load Pyodide's loader script (UMD) and return the global factory.
      async function loadPyodideScript() {
        await import(`${PYODIDE_INDEX}pyodide.mjs`).then((m) => {
          window.loadPyodide = m.loadPyodide;
        });
      }

      // Fetch every file in the manifest and write it into Pyodide's FS at the
      // same repo-relative path, creating parent dirs as needed.
      async function writePackageToFS(pyodide) {
        const manifest = await fetch("../public/manifest.json").then((r) => r.json());
        for (const path of manifest) {
          const source = await fetch(`../${path}`).then((r) => r.text());
          const dir = path.slice(0, path.lastIndexOf("/"));
          if (dir) pyodide.FS.mkdirTree(dir);
          pyodide.FS.writeFile(path, source);
        }
      }

      async function main() {
        await loadPyodideScript();
        setSplash("Starting Pyodide…");
        const pyodide = await window.loadPyodide({ indexURL: PYODIDE_INDEX });

        // pydantic + pydantic_core come from Pyodide's OWN package index as
        // prebuilt emscripten wheels — NOT from PyPI (which ships no WASM wheel).
        // See NOTES-T3.md / A0.
        setSplash("Loading pydantic…");
        await pyodide.loadPackage(["pydantic"]);

        setSplash("Loading tempestweb…");
        // Make the repo root (cwd in the FS) importable, then write the package.
        pyodide.runPython("import sys; sys.path.insert(0, '')");
        await writePackageToFS(pyodide);

        setSplash("Building app…");
        // Import the app module by file path → module, then bootstrap it. The
        // bootstrap returns a handle; `on_patches` is our JS callback (receives a
        // JSON string of the patch batch). We stash the handle on the Python side.
        const moduleName = APP_MODULE.replace(/\.py$/, "").replaceAll("/", ".");
        const handle = pyodide.runPython(`
import importlib
from tempestweb.runtime import bootstrap

app_mod = importlib.import_module("${moduleName}")
state = app_mod.make_state()
_handle = None

def _start(on_patches):
    global _handle
    _handle = bootstrap(state, app_mod.view, on_patches)
    return _handle

_start
`);

        // The JS DOM renderer + Style->CSS + event binding are T1's `dom.js`/
        // `tempestweb.js` (shared by both modes). Import them; if T1 has not
        // landed yet, we fall back to console-logging the wire traffic, which is
        // enough to PROVE Mode A (core + pydantic_core ran in WASM and produced
        // patches in the browser).
        let mount = null;
        try {
          ({ mount } = await import("../client/tempestweb.js"));
        } catch (e) {
          console.warn("[tempestweb] DOM renderer not available yet (T1):", e);
        }

        const { createWasmTransport } = await import("../client/transport-wasm.js");

        // Build the pyodide.ffi bridge: patches cross IN as a JSON string from
        // Python; events cross OUT as a JSON string to Python's push_event_json.
        let deliverHandler = () => {};
        const onPatchesFromPython = (patchesJson) => {
          const patches = JSON.parse(patchesJson);
          console.log("[tempestweb] patch batch from WASM:", patches);
          deliverHandler(patches);
        };

        // Start the Python app, handing it the JS patch sink.
        const pyHandle = handle(onPatchesFromPython);

        const bridge = {
          onDeliver: (cb) => {
            deliverHandler = cb;
          },
          pushEvent: (event) => {
            pyHandle.push_event_json(JSON.stringify(event));
          },
          close: () => {
            pyHandle.close();
          },
        };

        const transport = createWasmTransport(bridge);
        const initialNode = JSON.parse(pyHandle.initial_node_json());
        console.log("[tempestweb] initial node from WASM:", initialNode);

        if (mount) {
          mount(root, transport, initialNode);
        } else {
          root.innerHTML =
            "<p>Mode A bootstrap OK — Pyodide + pydantic_core ran in the browser " +
            "and produced the IR/patches (see console). The DOM renderer (T1) is " +
            "not wired yet; merge T1 for the live counter.</p>";
          // Still register a no-op patch handler so the buffer drains and the
          // app's rebuild loop does not back up.
          transport.onPatches((patches) =>
            console.log("[tempestweb] (no renderer) patches:", patches),
          );
        }

        splash.classList.add("hidden");
      }

      main().catch((err) => {
        console.error(err);
        setSplash(`Error: ${err.message ?? err}`);
      });
    </script>
  </body>
</html>
